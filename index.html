<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">

  <title>上海行寶藏酒店尋寶</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    /* 卡片翻轉動畫設定 */
    .flip-card { perspective: 1000px; height: 450px; }
    .flip-card-inner {
      position: relative; width: 100%; height: 100%; text-align: center;
      transition: transform 0.6s; transform-style: preserve-3d;
    }
    .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
    .flip-card-front, .flip-card-back {
      position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
      border-radius: 1rem; padding: 1.25rem; display: flex; flex-direction: column; justify-content: flex-start;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
    }
    .flip-card-front { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #334155; }
    .flip-card-back {
      background: linear-gradient(145deg, #3b0764, #170229); border: 1px solid #6b21a8; transform: rotateY(180deg);
    }
    .hotel-image {
      width: 100%; height: 160px; border-radius: 0.75rem; object-fit: cover;
      margin-bottom: 0.75rem; border: 1px solid #334155;
    }
    /* 公仔頭像特效 */
    .avatar-img {
      width: 90px; height: 90px; border-radius: 50%; object-fit: cover;
      border: 3px solid #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
      cursor: pointer; transition: transform 0.3s, box-shadow 0.3s;
    }
    .avatar-img:hover { transform: scale(1.1); box-shadow: 0 0 25px rgba(56, 189, 248, 0.9); }
    .cursor::after { content: '|'; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
